spring:
  application:
    name: contact-management-api
  data:
    mongodb:
      # Override for Atlas: set MONGODB_URI to your connection string
      uri: ${MONGODB_URI:mongodb://127.0.0.1:27017/contacts_db?serverSelectionTimeoutMS=5000&connectTimeoutMS=5000}
      auto-index-creation: true

server:
  port: ${PORT:8080}

app:
  jwt:
    # Min 32 bytes for HS256; override in production via JWT_SECRET
    secret: ${JWT_SECRET:ChangeThisDevelopmentJwtSecretKey32B}
    expiration-ms: 86400000
  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

logging:
  level:
    org.springframework.security: INFO
